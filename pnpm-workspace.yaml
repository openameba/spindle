packages:
  - 'packages/*'

# Security and trust
trustPolicy: no-downgrade

# Peer dependencies handling
strictPeerDependencies: true
autoInstallPeers: false

# Performance
preferOffline: true

# Scripts - disable by default for security
ignoreScripts: true

# Package updates (align with Renovate's security:minimumReleaseAgeNpm)
# 3 days = 4320 minutes
minimumReleaseAge: 4320

peerDependencyRules:
  ignoreMissing:
    - hono
  allowedVersions:
    stylelint-selector-bem-pattern>stylelint: '17'
    # Temporary workaround: @storybook/addon-mcp currently resolves valibot 1.2.0 via @tmcp/adapter-valibot.
    # NOTE: This intentionally permits a peer version mismatch and may hide runtime incompatibilities.
    # TODO: Remove this once the Storybook MCP dependency chain supports a valibot version compatible with @valibot/to-json-schema.
    '@valibot/to-json-schema>valibot': '1.2.0'

overrides:
  superstatic: 10.0.0
  axios: 1.16.1
  undici: 7.25.0
  undici-types: 8.3.0
  semver: 7.8.0
  chokidar: 5.0.0
