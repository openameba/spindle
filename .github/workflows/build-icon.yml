name: build icon

on:
  workflow_dispatch:
    inputs:
      icon_names:
        description: 'Figma component names (snake_case) as a JSON array, or ["ALL"] for all icons. e.g. ["align_left","album_fill"]'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build_icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate figma.json
        env:
          FILE_KEY: ${{ secrets.FIGMA_ICON_FILE_KEY }}
          NODE_ID: ${{ secrets.FIGMA_ICON_NODE_ID }}
          ICON_NAMES: ${{ inputs.icon_names }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');

          const raw = (process.env.ICON_NAMES ?? '').trim();
          if (raw === '') {
            console.error('`icon_names` is required. Provide a JSON array of Figma component names, e.g. ["align_left","album_fill"], or ["ALL"] for all icons.');
            process.exit(1);
          }

          let iconNames;
          try {
            iconNames = JSON.parse(raw);
          } catch {
            console.error('`icon_names` must be a valid JSON array, e.g. ["align_left"] or ["ALL"].');
            process.exit(1);
          }

          if (
            !Array.isArray(iconNames) ||
            iconNames.length === 0 ||
            !iconNames.every((name) => typeof name === 'string')
          ) {
            console.error('`icon_names` must be a non-empty JSON array of strings.');
            process.exit(1);
          }

          const config = {
            fileKey: process.env.FILE_KEY,
            nodeId: process.env.NODE_ID,
            dest: 'dist',
            iconNames:
              iconNames.length === 1 && iconNames[0] === 'ALL' ? 'ALL' : iconNames,
          };

          fs.writeFileSync(
            'packages/spindle-icons/figma.json',
            JSON.stringify(config, null, 2),
          );
          EOF
      - name: Update Icons
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_TOKEN_CODE_CONNECT }} # This is for Figma Code Connect in spindle-ui
        run: |
          pnpm --filter @openameba/spindle-icons build
          pnpm --filter @openameba/spindle-ui icon
          pnpm fix
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: 'feat(spindle-icons): update icons'
          branch: feat/build-icon
          delete-branch: true
          title: 'feat(spindle-icons): update icons'
          body: ''
          labels: |
            spindle-icons
            spindle-ui
