name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository == 'openameba/spindle'
    permissions:
      contents: write
      pull-requests: write # Needed for creating pull requests
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # pnpm store cache intentionally omitted so this release workflow does
      # not restore cache entries that may have been written by PR-triggered
      # workflows. Release runs are infrequent; install-time increase is
      # acceptable.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build spindle-hooks
        run: pnpm --filter @openameba/spindle-hooks build

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm version-packages
          commit: 'chore: publish'
          title: 'chore: publish'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.hasChangesets == 'false'
    environment: production-npm
    permissions:
      contents: read
      id-token: write # Needed for npm Trusted Publishing (OIDC)
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      # pnpm store cache intentionally omitted so this release workflow does
      # not restore cache entries that may have been written by PR-triggered
      # workflows. Release runs are infrequent; install-time increase is
      # acceptable.
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: 'https://registry.npmjs.org'

      # Update npm (>=11.5.1 required for OIDC/provenance); install latest
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Stage publish artifacts here in topological order; letting
      # `changeset publish` fire prepublishOnly in parallel races a
      # producer's `rm -rf dist` (via prebuild) against a consumer
      # reading the same dist through the workspace symlink.
      - name: Prepare publishable packages
        run: pnpm -r --if-present run prepublishOnly

      - name: Publish to npm
        run: pnpm changeset publish
