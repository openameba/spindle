name: deploy UI preview

on:
  - pull_request_target

jobs:
  check_paths:
    runs-on: ubuntu-latest
    # need specified label if Pull-request from fork
    if: >
      github.event.pull_request.head.repo.full_name == github.repository || (
        github.event.pull_request.head.repo.full_name != github.repository &&
        github.event.pull_request.action == 'labeled' &&
        contains(github.event.pull_request.labels.*.name, 'allow execute workflow')
      )
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'refs/pull/${{ github.event.number }}/merge'
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            ui:
              - 'packages/spindle-ui/**'
  build_and_preview:
    runs-on: ubuntu-latest
    needs: check_paths
    if: ${{ needs.check_paths.outputs.ui == 'true' }}
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: 'refs/pull/${{ github.event.number }}/merge'
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: package.json
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: |
          pnpm --filter @openameba/spindle-hooks build
          pnpm --filter @openameba/spindle-ui storybook:build
      - name: deploy to preview channel
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          expires: 30d
          entryPoint: ./packages/spindle-ui/
